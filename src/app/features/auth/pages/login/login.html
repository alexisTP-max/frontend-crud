<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-sm">
        <h1 class="mb-2 text-3xl font-bold text-slate-800">Login</h1>
        <p class="mb-6 text-sm text-slate-600">acceso</p>

        <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-4">
            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
                <input type="email" formControlName="email"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-sky-500" />
                @if (email?.invalid && email?.touched) {
                <p class="mt-1 text-xs text-red-600">email valido</p>
                }
            </div>

            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700">contraseña</label>
                <input type="password" formControlName="password"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-sky-500" />
                @if (password?.invalid && password?.touched) {
                <p class="mt-1 text-xs text-red-600">Password 6 caracteres.</p>
                }
            </div>

            <button type="submit" class="inset-ring-2 px-3 py-2 text-sm font-mono cursor-pointer">
                Login
            </button>
        </form>

        @if (errorMessage) {
        <p class="mt-4 rounded-lg bg-red-100 px-3 py-2 text-sm text-red-700">
            {{ errorMessage }}
        </p>
        }
    </div>
</div>
